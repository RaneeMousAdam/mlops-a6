name: ML Training Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Linter
        run: |
          echo "Running linter checks..."
          echo "Linter passed successfully."

  train:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Training Job
        run: |
          echo "Starting GPU training job..."
          echo "Training complete."
          exit 1

      - name: Create error log file on failure
        if: failure()
        run: |
          echo "Training failed. Collecting error logs..." > error_logs.txt
          echo "Check the logs above for details." >> error_logs.txt

      - name: Upload error_logs.txt as Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."